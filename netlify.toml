# Static site — publish repo root as-is (no npm build step).
[build]
  publish = "."
  command = ""

[[redirects]]
  from = "https://www.adityaaa.com/*"
  to = "https://adityaaa.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.adityaaa.com/*"
  to = "https://adityaaa.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://adityaaa.com/*"
  to = "https://adityaaa.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/asset/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
