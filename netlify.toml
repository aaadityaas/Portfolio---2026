# Static site — publish repo root as-is (no npm build step).
# Media/font assets are NOT served from Netlify; they live on the gh-pages
# branch and load via https://aaadityaas.github.io/Portfolio---2026/asset/...
# (see asset/head-boot.js → window.ASSET_BASE_URL).
# Last touched: 2026-06-27 (force-trigger Netlify build).
[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
