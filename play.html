<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS | Designer Portfolio</title>
    <link rel="stylesheet" href="style.css?v=play-layout-editor-3">
    <!-- Premium Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:ital,wght@0,100..900;1,100..900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Patrick+Hand&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"

</head>

<body class="play-canvas-layout">

    <!-- Full-screen preload until window + media/iframes are ready (portfolio-loader-* in style.css + script.js) -->
    <div id="portfolio-loader" class="portfolio-loader" aria-live="polite" aria-busy="true" role="status"
        aria-valuetext="Loading portfolio">
        <div class="portfolio-loader__grid" aria-hidden="true"></div>
        <div class="portfolio-loader__stage">
            <div class="portfolio-loader__orbit">
                <span class="portfolio-loader__pixel" aria-hidden="true"></span>
                <span class="portfolio-loader__pixel" aria-hidden="true"></span>
                <span class="portfolio-loader__pixel" aria-hidden="true"></span>
                <span class="portfolio-loader__pixel" aria-hidden="true"></span>
                <span class="portfolio-loader__pixel" aria-hidden="true"></span>
                <span class="portfolio-loader__pixel" aria-hidden="true"></span>
            </div>
        </div>
    </div>
    <script>
        try { if (localStorage.getItem('portfolio-theme') === 'dark') document.body.classList.add('night-mode'); } catch (e) {}
    </script>

    <div data-site-header data-page="play"></div>

    <main class="play-page">
        <!-- Scroll canvas — use wheel / trackpad / touch scroll to explore.
             Layer order back → front (z-index in CSS):
               0. .play-grid    — dots + mesh grid
               1. .play-overlay — viewport-pinned title + subtitle
               2. .play-world   — cards + stickers
               6. .play-mascot  — fixed bottom-edge mascot
             The grid lives on its own sibling element (instead of being
             baked into .play-world's background) so the title can be
             layered between the grid and the cards. initPlayCanvas() in
             script.js translates .play-world and shifts .play-grid's
             background-position from the same pan values, while clamping
             scroll endpoints from the outermost card bounds plus large
             edge padding so users do not drift into empty grid forever.
             • Cards (.play-card) sit at fixed positions on the world and
               move with it. data-z="N" overrides DOM-order stacking so
               overlapping cards can layer intentionally (higher = front).
             • Stickers ([data-play-sticker]) sit on the world AND can be
               dragged individually. Positions persist in localStorage
               (key: play-sticker-positions). Stickers always sit above
               cards (z-index: 10 in CSS).
             • Add more stickers by dropping <div class="play-sticker"
               data-play-sticker data-sticker-id="UNIQUE" data-x data-y
               data-rot data-w><img src="..." draggable="false"></div>
               into .play-world. -->
        <div class="play-canvas" id="play-canvas" data-play-canvas>
            <!-- Layer 0: grid background. It fills the viewport;
                 JS shifts background-position as the canvas scrolls so the
                 grid remains aligned to world coordinates. Scroll itself is
                 finite, based on the outermost cards plus large padding. -->
            <div class="play-grid" data-play-grid></div>

            <div class="play-editor" data-play-editor aria-label="Play layout editor">
                <button class="play-editor__toggle" type="button" data-play-editor-toggle aria-pressed="false">
                    Edit layout
                </button>
                <div class="play-editor__panel" data-play-editor-panel hidden>
                    <div class="play-editor__header">
                        <span class="play-editor__title" data-play-editor-current>No selection</span>
                        <span class="play-editor__status" data-play-editor-status>Unsaved</span>
                    </div>
                    <div class="play-editor__fields" aria-label="Selected item values">
                        <label class="play-editor__field">
                            <span>X</span>
                            <input type="number" step="1" data-play-editor-input="x" inputmode="numeric">
                        </label>
                        <label class="play-editor__field">
                            <span>Y</span>
                            <input type="number" step="1" data-play-editor-input="y" inputmode="numeric">
                        </label>
                        <label class="play-editor__field">
                            <span>Rotate</span>
                            <input type="number" step="1" data-play-editor-input="rot" inputmode="numeric">
                        </label>
                        <label class="play-editor__field">
                            <span>Layer</span>
                            <input type="number" step="1" data-play-editor-input="z" inputmode="numeric">
                        </label>
                    </div>
                    <div class="play-editor__actions" aria-label="Layout actions">
                        <button type="button" data-play-editor-action="rotate-left">Rotate -5</button>
                        <button type="button" data-play-editor-action="rotate-right">Rotate +5</button>
                        <button type="button" data-play-editor-action="send-back">Back</button>
                        <button type="button" data-play-editor-action="bring-front">Front</button>
                        <button type="button" data-play-editor-action="save">Save</button>
                        <button type="button" data-play-editor-action="copy">Copy JSON</button>
                        <button type="button" data-play-editor-action="reset">Reset</button>
                    </div>
                    <p class="play-editor__hint">Drag an item to move it. Use the round handle to rotate. Arrow keys nudge the selection.</p>
                </div>
            </div>

            <div class="play-editor-selection" data-play-editor-selection hidden aria-hidden="true">
                <span class="play-editor-selection__line"></span>
                <button class="play-editor-selection__handle" type="button" data-play-editor-rotate-handle aria-label="Rotate selected item"></button>
            </div>

            <!-- Layer 1: title overlay — viewport-pinned (inset: 0 fills
                 the canvas which itself fills the viewport). Sits ABOVE
                 the grid (so the grid reads as a true background) and
                 BELOW the world (so cards visually obscure the title
                 wherever they sit on top of it). pointer-events: none
                 so it never intercepts scroll/sticker drag. -->
            <div class="play-overlay" aria-hidden="false">
                <div class="play-overlay__inner">
                    <h1 class="play-overlay__title">my playground</h1>
                    <p class="play-overlay__subtitle">Scroll to move around</p>
                </div>
            </div>

            <!-- Layer 2: cards + stickers. Transparent background so the
                 grid + title behind it remain visible wherever no card sits. -->
            <div class="play-world" data-play-world>
                <!-- Cards: data-x/y are world coords (px), data-w/h are size,
                     data-rot is degrees, data-z (optional) overrides stacking
                     order. All cards are edge-to-edge (no polaroid frames).
                     Sizes are intentionally per-card so you can later make
                     specific cards small / big by editing data-w and data-h. -->
                <div class="play-card"
                     data-play-layout-id="zapp-add-money"
                     data-x="816" data-y="1246" data-w="228" data-h="295" data-rot="-3"
                     data-play-title="Add Balance Interaction for Zapp Account"
                     data-play-description="A concept for making add-money feel more tangible, guided, and memorable inside the Zapp flow.">
                    <div class="play-card__media">
                        <video autoplay loop muted playsinline>
                            <source src="asset/zapp-add-money.mp4" type="video/mp4">
                            <source src="asset/zapp-add-money.mov" type="video/quicktime">
                        </video>
                    </div>
                </div>

                <div class="play-card play-card--transparent"
                     data-play-layout-id="sero"
                     data-x="1904" data-y="1170" data-w="256" data-h="307" data-rot="4"
                     data-play-title="Sero"
                     data-play-description="A visual identity exploration focused on expressive form, color, and a distinctive digital presence.">
                    <div class="play-card__media" style="background-image: url('asset/play_sero.png');"></div>
                </div>

                <!-- Top-center card. data-z="2" so if you nudge it to overlap
                     a sibling card it stays in front; in this layout it doesn't
                     overlap anything but the value documents intent. -->
                <div class="play-card"
                     data-play-layout-id="flower-valley"
                     data-x="1378" data-y="531" data-w="269" data-h="349" data-rot="-2" data-z="2"
                     data-play-title="Flower Valley Memory"
                     data-play-description="A postcard-like landscape study focused on softness, scale, and air.">
                    <div class="play-card__media" style="background-image: url('asset/flower%20valey.png');"></div>
                </div>

                <div class="play-card"

                     data-play-description="A color and timing study built around dusk light and slow tonal transitions.">
                    <div class="play-card__media" style="background-image: url('asset/sunset.png');"></div>
                </div>

                <!-- Middle-left card. data-z="1" — sits behind any data-z="2" card
                     it might overlap with after future repositioning. -->
                <div class="play-card"
                     data-play-layout-id="turnip"
                     data-x="818" data-y="904" data-w="269" data-h="343" data-rot="-4" data-z="1"
                     data-play-title="Turnip"
                     data-play-description="A playful character illustration exploring expressive form, bold color, and personality.">
                    <div class="play-card__media" style="background-image: url('asset/play_Turnip.png');"></div>
                </div>

                <div class="play-card"
                     data-play-layout-id="type-36-days"
                     data-x="1387" data-y="1170" data-w="316" data-h="242" data-rot="2" data-z="1"
                     data-play-title="36 Days of Type"
                     data-play-description="A typography experiment exploring letterforms, composition, and visual rhythm.">
                    <div class="play-card__media" style="background-image: url('asset/play_36DaysofType.png');"></div>
                </div>

                <div class="play-card"
                     data-play-layout-id="spin-the-wheel"
                     data-x="1910" data-y="809" data-w="242" data-h="310" data-rot="-2" data-z="2"
                     data-play-title="Spin the Wheel"
                     data-play-description="A colorful interaction concept built around chance, motion, and playful anticipation.">
                    <div class="play-card__media" style="background-image: url('asset/play_SpintheWheel.png');"></div>
                </div>

                <div class="play-card play-card--stats"
                     data-play-layout-id="gradient-texture"
                     data-x="696" data-y="632" data-w="289" data-h="222" data-rot="6" data-z="1"
                     data-play-title="Gradient Texture"
                     data-play-description="A gradient and texture experiment exploring expressive color, depth, and visual reach."
                     data-play-heart="1.1k" data-play-user="37.3k">
                    <div class="play-card__media" style="background-image: url('asset/play_gradienttexture.png');"></div>
                    <div class="play-card__confetti" aria-hidden="true">
                        <img class="play-card__confetti-item play-card__confetti-item--heart"
                             src="asset/play_gradinettexture_heart.png" alt="">
                        <img class="play-card__confetti-item play-card__confetti-item--user"
                             src="asset/play_gradinettexture_user.png" alt="">
                    </div>
                </div>

                <div class="play-card"
                     data-play-layout-id="zakir"
                     data-x="2132" data-y="1041" data-w="336" data-h="228" data-rot="5" data-z="1"
                     data-play-title="Zakir"
                     data-play-description="A portrait-led visual study balancing character, texture, and graphic composition.">
                    <div class="play-card__media" style="background-image: url('asset/play_Zakir.png');"></div>
                </div>

                <!-- Stickers — individually draggable. Swap the <img src> to
                     change the sticker artwork. Each needs a unique data-sticker-id
                     so its position persists independently. -->
                <div class="play-sticker"
                     data-play-sticker data-sticker-id="miracle-1"
                     data-x="1500" data-y="540" data-rot="-8" data-w="220">
                    <img src="asset/play_Miracle_sticker.png" alt="" draggable="false">
                </div>

                <div class="play-sticker"
                     data-play-sticker data-sticker-id="iterate-1"
                     data-x="940" data-y="1230" data-rot="10" data-w="230">
                    <img src="asset/play_Iterate_sticker.png" alt="" draggable="false">
                </div>

                <div class="play-sticker"
                     data-play-sticker data-sticker-id="bored-mac-1"
                     data-x="2180" data-y="780" data-rot="-7" data-w="150">
                    <img src="asset/play_Bored%20MAC_sticker.png" alt="" draggable="false">
                </div>

                <div class="play-sticker"
                     data-play-sticker data-sticker-id="closed-for-today-1"
                     data-x="1160" data-y="1570" data-rot="8" data-w="155">
                    <img src="asset/play_Closed%20for%20today_sticker.png" alt="" draggable="false">
                </div>
            </div>

            <div class="play-detail" data-play-detail hidden aria-hidden="true">
                <button class="play-detail__backdrop" type="button" data-play-detail-close
                    aria-label="Close play detail"></button>

                <div class="play-detail__stage" role="dialog" aria-modal="true"
                    aria-labelledby="play-detail-title" aria-describedby="play-detail-description">
                    <div class="play-detail__media-shell" data-play-detail-shell>
                        <div class="play-detail__media" data-play-detail-media></div>
                    </div>

                    <div class="play-detail__copy">
                        <div class="play-detail__title-pill" id="play-detail-title" data-play-detail-title></div>
                        <div class="play-detail__body-bubble" id="play-detail-description"
                            data-play-detail-description></div>
                        <div class="play-detail__stats" data-play-detail-stats hidden></div>
                    </div>
                </div>
            </div>
