            <div class="container" id="work">
                <div class="projects-header">
                    <h2 class="projects-title">my playground</h2>

                <!-- Scrapbook canvas: photos pinned at small rotations, sticky
                     notes interleaved between them. Each [data-play-card]
                     supports either an <img>, a <video>, or a CSS
                     background-image. Cards with [data-polaroid] get the
                     white photo-frame chrome; without it they sit edge-to-
                     edge. Sticky notes are decorative (pointer-events:none)
                     so they never intercept card clicks even when they
                     visually overlap a card.
                     Hover  → hovered card unwinds to upright + scales up,
                              siblings dim/saturate down.
                     Click  → card morphs into a centered popout; see
                              initPlayBentoPopout() in script.js. -->

                    <!-- ── Sticky notes (decorative, non-interactive) ── -->

    <!-- Play card popout — FLIP container transform target. The card clone is
         injected here on click and animated to fill .play-popout__stage; closing
         reverses the animation back to the card's original grid rect. -->
    <div class="play-popout" id="play-popout" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="play-popout-title">
        <div class="play-popout__backdrop" data-popout-close></div>
        <div class="play-popout__stage" data-popout-stage></div>
        <div class="play-popout__caption">
            <h3 class="play-popout__title" id="play-popout-title"></h3>
            <p class="play-popout__detail"></p>
        </div>
        <button class="play-popout__close" type="button" data-popout-close aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>

    <!-- Project Modal Overlay -->

    <script src="script.js"></script>

    <!-- Agentation: Visual feedback for AI agents (connects to http://localhost:4747) -->
    <script>
        (function () {
            const ENDPOINT = 'http://localhost:4747';
            const SESSION_KEY = 'agentation_session_id';
            let sessionId = localStorage.getItem(SESSION_KEY);
            let active = false;
            let annotations = [];
            let pendingEl = null;

            // ── Create toolbar ──────────────────────────────────────────────
            const toolbar = document.createElement('div');
            toolbar.id = 'agentation-toolbar';
            toolbar.style.cssText = `
        position:fixed; bottom:20px; right:20px; z-index:99999;
        display:flex; flex-direction:column; align-items:flex-end; gap:8px;
        font-family:system-ui,sans-serif;
      `;

            const toggleBtn = document.createElement('button');
            toggleBtn.title = 'Toggle Agentation';
            toggleBtn.style.cssText = `
        width:44px; height:44px; border-radius:50%; border:none; cursor:none;
        background:#1a1a2e; color:#fff; font-size:18px; box-shadow:0 4px 20px rgba(0,0,0,.35);
        display:flex; align-items:center; justify-content:center;
        transition:transform .2s,background .2s;
      `;
            toggleBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`;

            const badge = document.createElement('span');
            badge.style.cssText = `
        position:absolute; top:-4px; right:-4px; background:#e74c3c; color:#fff;
        font-size:10px; min-width:16px; height:16px; border-radius:8px;
        display:none; align-items:center; justify-content:center; padding:0 3px;
        font-weight:700;
      `;
            toggleBtn.style.position = 'relative';
            toggleBtn.appendChild(badge);
            toolbar.appendChild(toggleBtn);

            document.body.appendChild(toolbar);

            // ── Session init ─────────────────────────────────────────────────
            async function initSession() {
                try {
                    const res = await fetch(`${ENDPOINT}/api/sessions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: location.href, existingSessionId: sessionId })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        sessionId = data.sessionId || data.id || sessionId;
                        if (sessionId) {
                            localStorage.setItem(SESSION_KEY, sessionId);
                            console.log('[Agentation] Session started:', sessionId);
                        }
                    }
                } catch (e) {
                    // Server may not expose session endpoint — still functional locally
                    sessionId = sessionId || ('local-' + Date.now());
                    localStorage.setItem(SESSION_KEY, sessionId);
                    console.log('[Agentation] Local session:', sessionId);
                }
            }

            // ── Highlight hovered elements ───────────────────────────────────
            let hovered = null;
            const highlight = document.createElement('div');
            highlight.style.cssText = `
        position:fixed; pointer-events:none; z-index:99998;
        border:2px solid #6c63ff; border-radius:4px; background:rgba(108,99,255,.08);
        transition:all .1s ease; display:none;
      `;
            document.body.appendChild(highlight);

            function showHighlight(el) {
                const r = el.getBoundingClientRect();
                highlight.style.display = 'block';
                highlight.style.top = r.top + 'px';
                highlight.style.left = r.left + 'px';
                highlight.style.width = r.width + 'px';
                highlight.style.height = r.height + 'px';
            }

            // ── Annotation popup ─────────────────────────────────────────────
            const popup = document.createElement('div');
            popup.style.cssText = `
        position:fixed; z-index:999999; background:#fff; border-radius:12px;
        box-shadow:0 8px 40px rgba(0,0,0,.22); padding:16px; width:280px;
        display:none; flex-direction:column; gap:10px;
        font-family:system-ui,sans-serif; font-size:13px; color:#111;
      `;
            popup.innerHTML = `
        <div style="font-weight:600;font-size:14px;color:#1a1a2e">Add Annotation</div>
        <textarea id="agentation-note" placeholder="Describe the issue or feedback…"
          style="resize:vertical;min-height:80px;border:1.5px solid #e0e0e0;border-radius:8px;
          padding:8px;font-size:13px;font-family:inherit;outline:none;"></textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button id="agentation-cancel" style="padding:6px 14px;border:1.5px solid #ddd;
            border-radius:8px;background:#fff;cursor:none;font-size:12px;">Cancel</button>
          <button id="agentation-add" style="padding:6px 14px;border:none;border-radius:8px;
            background:#6c63ff;color:#fff;cursor:none;font-size:12px;font-weight:600;">Add</button>
        </div>
      `;
            document.body.appendChild(popup);

            function getCSSPath(el) {
                const parts = [];
                while (el && el !== document.body) {
                    let selector = el.tagName.toLowerCase();
                    if (el.id) { selector += '#' + el.id; parts.unshift(selector); break; }
                    const siblings = Array.from(el.parentNode?.children || []).filter(c => c.tagName === el.tagName);
                    if (siblings.length > 1) selector += ':nth-child(' + (Array.from(el.parentNode.children).indexOf(el) + 1) + ')';
                    parts.unshift(selector);
                    el = el.parentNode;
                }
                return parts.join(' > ');
            }

            function openPopup(el, x, y) {
                pendingEl = el;
                popup.style.display = 'flex';
                const pw = 280, ph = 180;
                const left = Math.min(x + 10, window.innerWidth - pw - 10);
                const top = Math.min(y + 10, window.innerHeight - ph - 10);
                popup.style.left = left + 'px';
                popup.style.top = top + 'px';
                popup.querySelector('#agentation-note').value = '';
                setTimeout(() => popup.querySelector('#agentation-note').focus(), 50);
            }

            popup.querySelector('#agentation-cancel').onclick = () => {
                popup.style.display = 'none'; pendingEl = null;
            };

            popup.querySelector('#agentation-add').onclick = async () => {
                const note = popup.querySelector('#agentation-note').value.trim();
                if (!note) return;
                const r = pendingEl.getBoundingClientRect();
                const annotation = {
                    id: 'a-' + Date.now(),
                    comment: note,
                    elementPath: getCSSPath(pendingEl),
                    element: pendingEl.tagName.toLowerCase(),
                    timestamp: Date.now(),
                    x: ((r.left + r.width / 2) / window.innerWidth) * 100,
                    y: r.top + window.scrollY,
                    boundingBox: { x: r.left, y: r.top, width: r.width, height: r.height },
                    url: location.href,
                    sessionId
                };
                annotations.push(annotation);
                updateBadge();
                popup.style.display = 'none';
                // Push to MCP server
                try {
                    await fetch(`${ENDPOINT}/api/annotations`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sessionId, annotation })
                    });
                } catch (e) { }
                showPin(annotation);
            };

            // ── Annotation pins ──────────────────────────────────────────────
            function showPin(ann) {
                const pin = document.createElement('div');
                pin.style.cssText = `
          position:absolute; left:${ann.x}%; top:${ann.y}px; width:20px; height:20px;
          background:#6c63ff; border-radius:50%; border:2px solid #fff;
          box-shadow:0 2px 8px rgba(0,0,0,.25); cursor:none; z-index:99990;
          display:flex; align-items:center; justify-content:center;
          color:#fff; font-size:10px; font-weight:700;
        `;
                pin.title = ann.comment;
                pin.textContent = annotations.indexOf(ann) + 1;
                document.body.appendChild(pin);
            }

            function updateBadge() {
                badge.textContent = annotations.length;
                badge.style.display = annotations.length > 0 ? 'flex' : 'none';
            }

            // ── Toggle active mode ───────────────────────────────────────────
            toggleBtn.onclick = () => {
                active = !active;
                toggleBtn.style.background = active ? '#6c63ff' : '#1a1a2e';
                document.body.style.cursor = active ? 'crosshair' : '';
                if (!active) { highlight.style.display = 'none'; popup.style.display = 'none'; }
            };

            document.addEventListener('mousemove', e => {
                if (!active) return;
                const el = document.elementFromPoint(e.clientX, e.clientY);
                if (el && el !== hovered && !toolbar.contains(el) && !popup.contains(el) && el !== highlight) {
                    hovered = el; showHighlight(el);
                }
            });

            document.addEventListener('click', e => {
                if (!active) return;
                const el = document.elementFromPoint(e.clientX, e.clientY);
                if (!el || toolbar.contains(el) || popup.contains(el) || el === highlight) return;
                e.preventDefault(); e.stopPropagation();
                openPopup(el, e.clientX, e.clientY);
            }, true);

            // ── Boot ─────────────────────────────────────────────────────────
            initSession();
        })();
    </script>
